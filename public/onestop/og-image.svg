<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <g opacity="0.06">
    <rect x="100" y="200" width="400" height="250" rx="8" stroke="white" stroke-width="2"/>
    <path d="M60 200 L300 60 L540 200" stroke="white" stroke-width="2"/>
    <rect x="700" y="300" width="200" height="150" rx="4" stroke="white" stroke-width="1.5"/>
    <path d="M680 300 L800 220 L920 300" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Red roof icon -->
  <path d="M520 200 L600 140 L680 200" stroke="#c0392b" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="540" y="200" width="120" height="70" fill="none" stroke="#c0392b" stroke-width="5" rx="4"/>
  <rect x="575" y="215" width="50" height="55" fill="none" stroke="#c0392b" stroke-width="3" rx="2"/>
  <!-- Text -->
  <text x="600" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="2">ONE STOP</text>
  <text x="600" y="385" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="32" fill="white" letter-spacing="6">OUTDOOR CONSTRUCTION</text>
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="20" fill="#edcd1f" letter-spacing="8">DESIGN &amp; BUILD</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#c0392b"/>
  <text x="600" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="white" letter-spacing="4">RICHMOND  |  KATY  |  HOUSTON  |  SUGAR LAND  |  ROSENBERG</text>
</svg>
